<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=834, initial-scale=1.0">
  <title>규비 대문</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .banner {
      position: relative;
      width: 834px;
      height: 1061px;
      background-image: url('https://raw.githubusercontent.com/kyumumbling-debug/KYUBI-Cafe-banner/main/규비카페대문.png');
      background-size: cover;
      background-position: center;
    }

    /* 유튜브 영상 (60px 아래로 이동) */
    .youtube-frame {
      position: absolute;
      left: 100px;
      top: 431px; /* 기존 585 → +60 */
      width: 625px;
      height: 340px;
      border: 3px solid #9cb7fc;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 12px rgba(156, 183, 252, 1);
      z-index: 2;
    }

    /* 클릭 가능한 투명 영역 */
    .hotspot {
      position: absolute;
      cursor: pointer;
      z-index: 3;
    }

    /* 상단 줄 (좌상단 유튜브 / 우상단 치지직 /) */
    .youtube { left: 150px; top: 80px; width: 80px; height: 80px; } /* 유튜브 */
    .chzzk { left: 600px; top: 80px; width: 80px; height: 80px; }     /* 치지직 */

    /* 하단 줄 (좌하단 X / 우하단 다시보기 ) */
    .x { left: 150px; top: 240px; width: 80px; height: 80px; } /* X(트윗) */
    .replay { left: 600px; top: 240px; width: 80px; height: 80px; } /* 다시보기 */
  </style>
</head>
<body>
  <div class="banner">
    <!-- 유튜브 영상 -->
    <div class="youtube-frame">
      <iframe width="100%" height="100%"
              src="https://www.youtube.com/embed/Xk_nZzlxGFc"
              frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- 클릭 가능한 영역들 -->
    <a class="hotspot chzzk" href="https://chzzk.naver.com/28cbc9a7f252b4bccf6fc479caca686e" target="_blank"></a>
    <a class="hotspot x" href="https://x.com/kyumumbling" target="_blank"></a>

    <a class="hotspot youtube" href="https://www.youtube.com/channel/UCAjwb0NQKBFpUtQZKDyH_eg" target="_blank"></a>
    <a class="hotspot replay" href="https://www.youtube.com/@Kyumumbling" target="_blank"></a>
  </div>
</body>
</html>
